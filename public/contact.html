  <h1 class="contact-heading">Let's Work Together</h1>
  <p class="contact-description">Have a project in mind? Send me a message and I'll get back to you!</p>

  <div class="contact-container">
    <form class="form-container" id="contact-form">

      <p class="form-description">Please fill out this form</p>

      <div class="form-group">
        <label class="form-label" for="name">Name:</label>
        <input class="form-input" type="text" id="name" name="name" required placeholder="Please enter your name">
      </div>

      <div class="form-group">
        <label class="form-label" for="email">Email:</label>
        <input class="form-input" type="email" id="email" name="email" required placeholder="Please enter your email">
      </div>

      <div class="form-group">
        <label class="form-label" for="message">Message:</label>
        <textarea id="message" name="message" class="text-input" rows="8" placeholder="Type your message here..."></textarea>
      </div>

      <button class="btn btn-primary" type="submit" id="submit-btn">Send Message 📩</button>

      

    </form>
  </div>
